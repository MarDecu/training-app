name: training_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 🔗 فتح اللينكات
  url_launcher: ^6.3.0

  # 🔥 Supabase (backend)
  supabase_flutter: ^2.12.4

  # 🧠 مهم جدًا لتفادي errors الداخلي
  shared_preferences: ^2.2.3

  # 🌐 HTTP requests
  http: ^1.2.0

  # 📄 PDF viewer
  flutter_pdfview: ^1.3.2

  # 📤 اختيار ملفات (Admin upload)
  file_picker: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/logo.png